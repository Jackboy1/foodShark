# Netlify Configuration for FoodShark App

[build]
  # Build command to execute
  command = "npm run build"
  
  # Directory to deploy (Vite outputs to 'dist')
  publish = "dist"
  
  # Base directory (root of project)
  base = "/"

# Redirect all routes to index.html for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Build environment variables (if needed)
[build.environment]
  NODE_VERSION = "18"

# Branch deploy settings (optional)
[context.production]
  command = "npm run build"
  publish = "dist"

[context.deploy-preview]
  command = "npm run build"
  publish = "dist"

# Headers for security and caching (optional but recommended)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
